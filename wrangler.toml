name               = "gridit"
account_id         = "c1a58888834f5ec157e4660fd6078417"
compatibility_date = "2023-12-01"

main = "./_worker.js"        # ← satisfies the "entry-point" check

[site]
bucket = "./public"          # ← folder containing built files

# Community counter: aggregates by country, no PII, free tier.
# Create with: wrangler d1 create gridit-counters
# Then paste the returned database_id here, and run:
#   wrangler d1 execute gridit-counters --file=./scripts/schema.sql
[[d1_databases]]
binding       = "DB"
database_name = "gridit-counters"
database_id   = "7fd52255-bc81-4f9b-881a-38085d35ea3a"

# Rate limit bucket: stores {count, resetAt} per session token (or hashed IP)
# with 60s TTL. Nothing persists. Create with:
#   wrangler kv:namespace create RL
# Then paste the returned id here.
[[kv_namespaces]]
binding = "RL"
id      = "273627878e3d427d83f9737fb8de7e03"

# Enable logging for debugging
[logs]
fatal = true
error = true
warn = true
info = true
debug = false
